<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Avax Scan - Decentralized DeFi Portal</title>
  <meta name="description" content="Secure, non-custodial portal for Avax Scan DeFi operations directly from your own wallet.">
  <link rel="canonical" href="https://avax-scan.github.io/">
  <meta name="robots" content="index,follow">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
  <style>


:root{
  --bg:#F7F5F2;
  --surface:#FFFFFF;
  --surface-soft:#FBFAF8;
  --ink:#151313;
  --muted:#625D5A;
  --faint:#9A928E;
  --line:rgba(21,19,19,.10);
  --line-strong:rgba(21,19,19,.16);
  --accent:#E84142;
  --accent-dark:#CC3031;
  --accent-soft:rgba(232,65,66,.10);
  --shadow:0 30px 80px -42px rgba(44,35,31,.42);
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  min-height:100dvh;
  overflow:hidden;
  color:var(--ink);
  background:
    radial-gradient(620px 360px at 50% -90px, rgba(232,65,66,.12), transparent 72%),
    linear-gradient(180deg, #fffaf8 0%, var(--bg) 48%, #f2efeb 100%);
  font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  display:flex;
  flex-direction:column;
}

a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
h1,p{margin:0}

.topbar{
  flex:0 0 auto;
  display:flex;
  align-items:center;
  gap:18px;
  width:100%;
  padding:18px clamp(18px,4vw,42px);
}
.brand{
  display:flex;
  align-items:center;
  gap:10px;
  min-width:0;
  font-weight:800;
  font-size:1.05rem;
  letter-spacing:0;
}
.brand img{
  width:30px;
  height:30px;
  border-radius:9px;
  box-shadow:0 8px 20px -14px rgba(232,65,66,.8);
  flex:none;
}
.nav{
  display:flex;
  align-items:center;
  gap:25px;
  margin-left:14px;
}
.nav a{
  color:var(--muted);
  font-size:.93rem;
  font-weight:560;
  white-space:nowrap;
  transition:color .16s ease;
}
.nav a:hover{color:var(--ink)}
.spacer{flex:1}
.ghost{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:38px;
  padding:8px 17px;
  border:1px solid var(--line-strong);
  border-radius:999px;
  background:rgba(255,255,255,.62);
  color:var(--ink);
  font-size:.91rem;
  font-weight:750;
  box-shadow:0 14px 28px -24px rgba(21,19,19,.35);
  transition:transform .14s ease,border-color .16s ease,background .16s ease;
}
.ghost:hover{
  transform:translateY(-1px);
  border-color:rgba(232,65,66,.34);
  background:#fff;
}

.stage{
  flex:1 1 auto;
  min-height:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  width:100%;
  padding:12px clamp(18px,4vw,42px) 10px;
  text-align:center;
}
.hero{
  display:flex;
  flex-direction:column;
  align-items:center;
}
h1{
  font-size:clamp(2.75rem,6vw,4.75rem);
  line-height:1.02;
  font-weight:850;
  letter-spacing:0;
}
.sub{
  max-width:52ch;
  margin-top:15px;
  color:var(--muted);
  font-size:clamp(1rem,1.55vw,1.18rem);
}
.sub strong{
  color:var(--ink);
  font-weight:800;
  box-shadow:inset 0 -.45em 0 var(--accent-soft);
}

.app-card{
  width:min(520px,100%);
  margin-top:30px;
  padding:18px;
  border:1px solid var(--line);
  border-radius:24px;
  background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,255,255,.88));
  box-shadow:var(--shadow);
}
.search-shell{
  display:flex;
  align-items:center;
  gap:10px;
  min-height:58px;
  padding:9px 11px;
  border:1px solid var(--line-strong);
  border-radius:17px;
  background:var(--surface-soft);
  text-align:left;
}
.token-chip{
  width:36px;
  height:36px;
  display:grid;
  place-items:center;
  border:1px solid var(--line);
  border-radius:999px;
  background:#fff;
  box-shadow:0 12px 25px -22px rgba(21,19,19,.45);
  flex:none;
}
.token-chip img{
  width:22px;
  height:22px;
  object-fit:contain;
}
input{
  min-width:0;
  width:100%;
  border:0;
  outline:0;
  background:transparent;
  color:var(--ink);
  font:700 1.02rem/1.2 inherit;
}
input::selection{
  color:#fff;
  background:var(--accent);
}
.result-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  min-height:48px;
  margin-top:12px;
  padding:0 4px 0 13px;
  border:1px solid var(--line);
  border-radius:15px;
  background:#fff;
  color:var(--muted);
  font-size:.94rem;
  font-weight:650;
}
.hint-toggle{
  flex:none;
  border:0;
  border-radius:999px;
  background:var(--accent-soft);
  color:var(--accent-dark);
  cursor:pointer;
  font:800 .78rem/1 inherit;
  padding:8px 10px;
  transition:background .16s ease,color .16s ease;
}
.hint-toggle:hover{
  background:var(--accent);
  color:#fff;
}
.hint-line{
  margin:10px 4px 0;
  color:var(--faint);
  font-size:.84rem;
  font-weight:600;
}
.hint-line[hidden]{display:none}
.primary{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  min-height:56px;
  margin-top:14px;
  border-radius:16px;
  background:var(--accent);
  color:#fff;
  font-weight:850;
  font-size:1.04rem;
  box-shadow:0 18px 34px -22px rgba(232,65,66,.92);
  transition:transform .14s ease,background .16s ease,box-shadow .16s ease;
}
.primary:hover{
  transform:translateY(-1px);
  background:var(--accent-dark);
  box-shadow:0 20px 38px -20px rgba(232,65,66,.86);
}

.foot{
  flex:0 0 auto;
  padding:16px 24px 22px;
  text-align:center;
  color:var(--faint);
  font-size:.84rem;
  font-weight:650;
}

.sr-only{
  position:absolute;
  width:1px;
  height:1px;
  padding:0;
  margin:-1px;
  overflow:hidden;
  clip:rect(0,0,0,0);
  white-space:nowrap;
  border:0;
}

@media(max-width:620px){
  .topbar{
    gap:10px;
    padding:14px 16px;
  }
  .brand{
    font-size:1rem;
  }
  .nav{
    display:none;
  }
  .ghost{
    min-height:36px;
    padding:8px 13px;
    font-size:.86rem;
  }
  .stage{
    justify-content:center;
    padding:8px 16px 8px;
  }
  h1{
    font-size:3rem;
  }
  .sub{
    margin-top:12px;
    font-size:1rem;
    max-width:31ch;
  }
  .app-card{
    margin-top:24px;
    padding:14px;
    border-radius:21px;
  }
  .search-shell{
    min-height:54px;
    border-radius:15px;
  }
  input{
    font-size:.98rem;
  }
  .result-row{
    min-height:46px;
    font-size:.88rem;
    padding-left:11px;
  }
  .primary{
    min-height:52px;
  }
  .foot{
    padding:12px 20px 16px;
  }
}

@media(max-width:360px){
  h1{font-size:2.7rem}
  .ghost{padding-inline:11px}
  .brand span{max-width:118px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
}


  
.footer {
  text-align: center !important;
}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>Avax Scan</span>
    </div>
    <span class="spacer"></span>
    <nav class="nav" aria-label="Main Navigation">
      <a href="how-it-works/">How it works</a>
      <a href="faq/">FAQ</a>
      <a href="about/">About</a>
      <a href="security/">Security</a>
      <a href="supported-chains/">Supported Chains</a>
    </nav>
  </header>
  <main class="stage" style="padding: 100px 24px; text-align: center; max-width: 800px; margin: 0 auto;">
    <h1 style="font-size: clamp(2.5rem, 6vw, 4.5rem); margin-bottom: 24px; font-weight: 800;">Avax Scan</h1>
    <p class="value" style="font-size: 1.25rem; opacity: 0.8; margin-bottom: 40px; line-height: 1.6;">Secure, non-custodial gateway for decentralized operations. Connect your Web3 wallet to enter the portal.</p>
    <a class="open-app" href="dashboard/" style="display: inline-flex; justify-content: center; align-items: center; min-height: 52px; padding: 0 32px; border-radius: 9999px; background: var(--accent, #625bf3); color: #fff; font-weight: 700; text-decoration: none; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: transform 0.2s ease;">Open App Dashboard</a>
  </main>
  <footer class="footer">Avax Scan &mdash; 2026</footer>
</body>
</html>
